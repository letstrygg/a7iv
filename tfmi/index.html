<!DOCTYPE html>
<html>
<head>
    <title>Idle Factory Prototype</title>
    <style>
        :root {
            --bg: #121212;
            --text: #e0e0e0;
            --border: #333;
            --accent: #4dabf7;
            --surface: #1e1e1e;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
        h2 { font-weight: 300; margin-bottom: 30px; }
        button {
            background-color: var(--surface);
            background-image: linear-gradient(to right, rgba(77, 171, 247, 0.15) var(--p, 0%), transparent var(--p, 0%));
            color: inherit;
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s, border-color 0.2s;
            margin: 0 8px 8px 0;
            position: relative;
        }
        button:hover { background-color: #252525; border-color: #555; }
        button.active-task { border-color: var(--accent); }
        hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
        #game-section { display: none; }
        .stat { color: var(--accent); font-weight: bold; }
        .estimate { color: #40c057; font-size: 0.9em; margin-left: 4px; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="/js/auth.js"></script>
</head>
<body>
    <h2>Idle Factory Client</h2>

    <div id="auth-section">
        <p>Please log in to play.</p>
        <button onclick="loginWith('google')">Login with Google</button>
        <button onclick="loginWith('twitch')">Login with Twitch</button>
        <button onclick="loginWith('github')">Login with GitHub</button>
    </div>

    <div id="game-section">
        <p>Logged in as: <span id="player-name"></span></p>
        <button onclick="logout()">Logout</button>
        <hr>
        <p>Resources — 
            Coal: <span id="coal-count" class="stat">0</span><span id="coal-plus" class="estimate"></span> | 
            Stone: <span id="stone-count" class="stat">0</span><span id="stone-plus" class="estimate"></span>
        </p>
        <hr>
        <button id="btn-stone" onclick="sendAction('Mine Stone')">Mine Stone</button>
        <button id="btn-coal" onclick="sendAction('Mine Coal')">Mine Coal</button>
    </div>

    <script>
        initAuth('{{ site.supabase_url }}', '{{ site.supabase_anon_key }}');

        let socket; 
        let resources = { coal: 0, stone: 0 };
        let currentTask = null;
        let progress = 0;
        let lastTime = 0;

        listenForAuthChanges(
            (session) => {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('game-section').style.display = 'block';
                
                // 1. STOP GRABBING THE GOOGLE NAME HERE. 
                // Show a loading state instead while we wait for Python.
                document.getElementById('player-name').textContent = "Connecting to server...";
                
                connectToServer(session.access_token);
            },
            () => {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('game-section').style.display = 'none';
                if (socket) socket.close();
            }
        );

        function connectToServer(token) {
            if (socket && (socket.readyState === WebSocket.CONNECTING || socket.readyState === WebSocket.OPEN)) return;

            socket = new WebSocket("wss://game.a7iv.com");
            
            socket.onopen = function(e) {
                e.target.send(JSON.stringify({ action: "authenticate", token: token }));
            };
            
            // 2. LISTEN FOR THE SERVER TO TELL US WHO WE ARE
            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.action === "auth_success") {
                    // Update the UI with the official database username
                    document.getElementById('player-name').textContent = data.username;
                    syncResources(data.coal, data.stone);
                } else if (data.action === "resource_update") {
                    syncResources(data.coal, data.stone);
                }
            };

            socket.onclose = function() { socket = null; };
        }

        function syncResources(coal, stone) {
            resources.coal = coal;
            resources.stone = stone;
            // Reset local progress because the server just "cashed out" the previous time
            progress = 0; 
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('coal-count').textContent = Math.floor(resources.coal);
            document.getElementById('stone-count').textContent = Math.floor(resources.stone);
            
            // Handle "+ 1" visibility
            document.getElementById('coal-plus').textContent = currentTask === 'Mine Coal' ? ' + 1' : '';
            document.getElementById('stone-plus').textContent = currentTask === 'Mine Stone' ? ' + 1' : '';

            // Handle button highlighting
            const coalBtn = document.getElementById('btn-coal');
            const stoneBtn = document.getElementById('btn-stone');
            
            coalBtn.classList.toggle('active-task', currentTask === 'Mine Coal');
            stoneBtn.classList.toggle('active-task', currentTask === 'Mine Stone');
            
            // Reset progress bars for non-active buttons
            if (currentTask !== 'Mine Coal') coalBtn.style.setProperty('--p', '0%');
            if (currentTask !== 'Mine Stone') stoneBtn.style.setProperty('--p', '0%');
        }

        function gameLoop(now) {
            if (!lastTime) lastTime = now;
            const dt = now - lastTime;
            lastTime = now;

            if (currentTask) {
                const duration = currentTask === 'Mine Coal' ? 4000 : 6000;
                progress += dt;

                if (progress >= duration) {
                    progress -= duration;
                    if (currentTask === 'Mine Coal') resources.coal++;
                    else resources.stone++;
                }
                
                const p = (progress / duration) * 100;
                const activeId = currentTask === 'Mine Coal' ? 'btn-coal' : 'btn-stone';
                document.getElementById(activeId).style.setProperty('--p', p + '%');
                updateDisplay();
            }
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);

        function sendAction(resource) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                currentTask = resource;
                socket.send(JSON.stringify({ action: resource }));
            }
        }
    </script>
</body>
</html>
