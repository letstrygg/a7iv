<!DOCTYPE html>
<html>
<head>
    <title>Idle Factory Prototype</title>
    <style>
        :root {
            --bg: #121212;
            --text: #e0e0e0;
            --border: #333;
            --surface: #1e1e1e;
            --hover-bg: #252525;
            --hover-border: #555;
            --red: #fa5252;
            --green: #40c057;
            --blue: #4dabf7;
            --sidebar-width: 200px;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: row;
        }
        #sidebar {
            background-color: var(--surface);
            border-right: 1px solid var(--border);
            padding: 0 10px;
            overflow-y: auto;
            transition: width 0.3s ease, margin-left 0.3s ease;
            width: calc(var(--sidebar-width) + 40px);
            flex-shrink: 0;
        }
        #sidebar.collapsed {
            width: 50px;
        }
        #sidebar-toggle {
            writing-mode: horizontal-tb;
            width: 100%;
            text-align: center;
            padding: 12px 8px;
            font-size: 16px;
            background: none;
            border: none;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            margin-bottom: 12px;
        }
        #sidebar-toggle:hover { background-color: var(--hover-bg); }
        .sidebar-label {
            writing-mode: horizontal-tb;
            padding: 6px 0;
            font-size: 12px;
            font-weight: 600;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #sidebar.collapsed .sidebar-label {
            display: block;
            height: 24px; /* Same height as the label would occupy */
            padding: 0;
            margin: 0;
            visibility: hidden;
        }
        .sidebar-button {
            display: block;
            width: 100%;
            padding: 8px 12px !important;
            font-size: 12px !important;
            text-align: left;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #sidebar.collapsed .sidebar-button {
            padding: 8px 6px !important;
            font-size: 10px;
        }
        #sidebar.collapsed .sidebar-button span { display: none; }
        #sidebar.collapsed .sidebar-button::before {
            content: attr(data-abbr);
            font-size: 10px;
            text-align: center;
            display: block;
        }
        #main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        h2 { font-weight: 300; margin-bottom: 30px; }
        button {
            background-color: var(--surface);
            background-image: linear-gradient(to right, rgba(77, 171, 247, 0.15) var(--p, 0%), transparent var(--p, 0%));
            color: inherit;
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s, border-color 0.2s;
            margin: 0 8px 8px 0;
            position: relative;
        }
        #sidebar-toggle, .sidebar-button {
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #main-content button {
            margin: 0 8px 8px 0;
        }
        button:hover { background-color: var(--hover-bg); border-color: var(--hover-border); }
        button.active-task { border-color: var(--blue); }
        hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
        #auth-section, #game-section { display: none; }
        .stat { color: var(--blue); font-weight: bold; position: relative; }
        .popup { 
            color: var(--green); 
            font-size: 0.9em; 
            font-weight: bold; 
            opacity: 0; 
            position: absolute;
            left: 0;
            top: -8px;
            white-space: nowrap;
            pointer-events: none;
        }
        .popup.loss { color: var(--red); }
        .dim { opacity: 0.6; };
        .animate-plus { animation: fadeUp 0.8s ease-out; }
        @keyframes fadeUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/local_env.js"></script>
    <script src="/js/auth.js"></script>
</head>
<body>
    <div id="sidebar">
        <button id="sidebar-toggle" onclick="toggleSidebar()">◀</button>
        <div class="sidebar-label">Gathering</div>
        <button id="btn-sticks" class="sidebar-button" title="Gather Sticks" data-abbr="g.stc" onclick="sendAction('Gather Sticks')"><span>Gather Sticks</span></button>
        <button id="btn-stone" class="sidebar-button" title="Gather Stone" data-abbr="g.stn" onclick="sendAction('Gather Stone')"><span>Gather Stone</span></button>
        <button id="btn-fiber" class="sidebar-button" title="Gather Fiber" data-abbr="g.fbr" onclick="sendAction('Gather Fiber')"><span>Gather Fiber</span></button>
        <button id="btn-coal" class="sidebar-button" title="Mine Coal" data-abbr="m.cl" onclick="sendAction('Mine Coal')"><span>Mine Coal</span></button>
        <div class="sidebar-label">Crafting</div>
        <button id="btn-pick-head" class="sidebar-button" title="Craft Pickaxe Head" data-abbr="c.ph" onclick="sendAction('Craft Pickaxe Head')"><span>Pickaxe Head</span></button>
        <button id="btn-axe-head" class="sidebar-button" title="Craft Axe Head" data-abbr="c.ah" onclick="sendAction('Craft Axe Head')"><span>Axe Head</span></button>
        <button id="btn-craft-pick" class="sidebar-button" title="Craft Pickaxe" data-abbr="c.pck" onclick="sendAction('Craft Pickaxe')"><span>Craft Pickaxe</span></button>
        <button id="btn-craft-axe" class="sidebar-button" title="Craft Axe" data-abbr="c.axe" onclick="sendAction('Craft Axe')"><span>Craft Axe</span></button>
        <div class="sidebar-label">Mining</div>
        <button id="btn-iron-ore" class="sidebar-button" title="Mine Iron" data-abbr="m.irn" onclick="sendAction('Mine Iron')"><span>Mine Iron</span></button>
        <button id="btn-chop" class="sidebar-button" title="Chop Wood" data-abbr="c.wd" onclick="sendAction('Chop Wood')"><span>Chop Wood</span></button>
        <div class="sidebar-label">Processing</div>
        <button id="btn-iron" class="sidebar-button" title="Smelt Iron" data-abbr="s.irn" onclick="sendAction('Smelt Iron')"><span>Smelt Iron</span></button>
    </div>

    <div id="main-content">
        <h2>Idle Factory</h2>

        <div id="auth-section">
            <p>Log in to play.</p>
            <button onclick="loginWith('google')">Login with Google</button>
            <button onclick="loginWith('twitch')">Login with Twitch</button>
            <button onclick="loginWith('github')">Login with GitHub</button>
        </div>

        <div id="game-section" style="position: relative;">
            <button onclick="logout()" class="btn dim">Logout</button>
            <p>Logged in as: <span id="player-name"></span></p>
            <hr>
            <p>Resources — 
                Coal: <span id="coal-count" class="stat">0</span><span id="coal-plus" class="popup"></span> | 
                Stone: <span id="stone-count" class="stat">0</span><span id="stone-plus" class="popup"></span> |
                Sticks: <span id="sticks-count" class="stat">0</span><span id="sticks-plus" class="popup"></span> |
                Flint: <span id="flint-count" class="stat">0</span><span id="flint-plus" class="popup"></span> |
                Gemstones: <span id="gemstones-count" class="stat">0</span><span id="gemstones-plus" class="popup"></span> |
                Fiber: <span id="fiber-count" class="stat">0</span><span id="fiber-plus" class="popup"></span> |
                Pickaxe Head: <span id="pickaxe_head-count" class="stat">0</span><span id="pickaxe_head-plus" class="popup"></span> |
                Iron Ore: <span id="iron_ore-count" class="stat">0</span><span id="iron_ore-plus" class="popup"></span> |
                Iron: <span id="iron-count" class="stat">0</span><span id="iron-plus" class="popup"></span> |
                Pickaxe: <span id="pickaxe-count" class="stat">0</span><span id="pickaxe-plus" class="popup"></span> |
                Wood: <span id="wood-count" class="stat">0</span><span id="wood-plus" class="popup"></span> |
                Axe Head: <span id="axe_head-count" class="stat">0</span><span id="axe_head-plus" class="popup"></span> |
                Axe: <span id="axe-count" class="stat">0</span><span id="axe-plus" class="popup"></span>
            </p>
            <hr>
            <p id="task-status">Task: Idle</p>
        </div>
    </div>

    <script>
        // Sidebar toggle functionality
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const isCollapsed = sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebarCollapsed', isCollapsed);
            const toggle = document.getElementById('sidebar-toggle');
            toggle.textContent = isCollapsed ? '▶' : '◀';
        }

        // Restore sidebar state on page load
        (function() {
            const sidebar = document.getElementById('sidebar');
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                sidebar.classList.add('collapsed');
                document.getElementById('sidebar-toggle').textContent = '▶';
            }
        })();

        // Detect if we are running locally or on the production server
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";

        // Fallback for Supabase keys if Jekyll isn't processing the file locally
        const localEnv = window.LOCAL_ENV || {};
        const spUrl = '{{ site.supabase_url }}'.startsWith('{{') ? localEnv.SUPABASE_URL : '{{ site.supabase_url }}';
        const spKey = '{{ site.supabase_anon_key }}'.startsWith('{{') ? localEnv.SUPABASE_ANON_KEY : '{{ site.supabase_anon_key }}';

        if (spUrl && spKey) {
            initAuth(spUrl, spKey);
        }

        let socket; 
        let resources = { 
            coal: 0, stone: 0, sticks: 0, flint: 0, gemstones: 0, 
            fiber: 0, pickaxe_head: 0, iron_ore: 0, iron: 0, pickaxe: 0,
            wood: 0, axe_head: 0, axe: 0
        };
        let resourceConfigs = {};
        let currentTask = null;
        let progress = 0;
        let sessionCount = 0;
        let lastTime = 0;

        listenForAuthChanges(
            (session) => {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('game-section').style.display = 'block';
                
                // 1. STOP GRABBING THE GOOGLE NAME HERE. 
                // Show a loading state instead while we wait for Python.
                document.getElementById('player-name').textContent = "Connecting to server...";
                
                connectToServer(session.access_token);
            },
            () => {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('game-section').style.display = 'none';
                if (socket) socket.close();
            }
        );

        function connectToServer(token) {
            if (socket && (socket.readyState === WebSocket.CONNECTING || socket.readyState === WebSocket.OPEN)) return;

            const wsUrl = isLocal ? "ws://localhost:8765" : "wss://game.a7iv.com";
            socket = new WebSocket(wsUrl);
            
            socket.onopen = function(e) {
                e.target.send(JSON.stringify({ action: "authenticate", token: token }));
            };
            
            // 2. LISTEN FOR THE SERVER TO TELL US WHO WE ARE
            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.action === "auth_success") {
                    // Update the UI with the official database username
                    document.getElementById('player-name').textContent = data.username;
                    resourceConfigs = data.resource_configs;

                    // Resume task and calculate progress based on server timestamp
                    currentTask = data.current_task;
                    if (currentTask && data.task_start) {
                        // SQLite uses UTC; adding 'Z' ensures JS treats it as UTC
                        const startTime = new Date(data.task_start + "Z").getTime();
                        const elapsed = Date.now() - startTime;
                        const duration = (resourceConfigs[currentTask] || 1) * 1000;
                        progress = elapsed % duration;
                    }

                    resources.coal = data.coal;
                    resources.stone = data.stone;
                    resources.sticks = data.sticks || 0;
                    resources.flint = data.flint || 0;
                    resources.gemstones = data.gemstones || 0;
                    resources.fiber = data.fiber || 0;
                    resources.pickaxe_head = data.pickaxe_head || 0;
                    resources.iron_ore = data.iron_ore || 0;
                    resources.iron = data.iron || 0;
                    resources.pickaxe = data.pickaxe || 0;
                    resources.wood = data.wood || 0;
                    resources.axe_head = data.axe_head || 0;
                    resources.axe = data.axe || 0;
                    updateDisplay();
                } else if (data.action === "resource_update") {
                    syncResources(data.stats, data.gains);
                }
            };

            socket.onclose = function() { socket = null; };
        }

        function syncResources(stats, gains) {
            // Show the "Cash Out" animations (+N)
            for (const [res, amount] of Object.entries(gains)) {
                if (amount > 0) triggerPopup(res + '-plus', '+' + amount, false);
                else if (amount < 0) triggerPopup(res + '-plus', amount, true);
            }

            resources = stats;
            // Reset local progress because the server just "cashed out" the previous time
            progress = 0; 
            sessionCount = 0;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('coal-count').textContent = Math.floor(resources.coal);
            document.getElementById('stone-count').textContent = Math.floor(resources.stone);
            document.getElementById('sticks-count').textContent = Math.floor(resources.sticks);
            document.getElementById('flint-count').textContent = Math.floor(resources.flint);
            document.getElementById('gemstones-count').textContent = Math.floor(resources.gemstones);
            document.getElementById('fiber-count').textContent = Math.floor(resources.fiber);
            document.getElementById('pickaxe_head-count').textContent = Math.floor(resources.pickaxe_head);
            document.getElementById('iron_ore-count').textContent = Math.floor(resources.iron_ore);
            document.getElementById('iron-count').textContent = Math.floor(resources.iron);
            document.getElementById('pickaxe-count').textContent = Math.floor(resources.pickaxe);
            document.getElementById('wood-count').textContent = Math.floor(resources.wood);
            document.getElementById('axe_head-count').textContent = Math.floor(resources.axe_head);
            document.getElementById('axe-count').textContent = Math.floor(resources.axe);
            
            const status = document.getElementById('task-status');
            status.textContent = currentTask ? `Task: ${currentTask} (+${sessionCount})` : 'Task: Idle';
            
            // Handle button highlighting
            const btnMap = {
                'Mine Coal': 'btn-coal', 'Gather Stone': 'btn-stone', 'Gather Sticks': 'btn-sticks',
                'Gather Fiber': 'btn-fiber', 'Craft Pickaxe Head': 'btn-pick-head', 'Craft Pickaxe': 'btn-craft-pick',
                'Mine Iron': 'btn-iron-ore', 'Smelt Iron': 'btn-iron',
                'Craft Axe Head': 'btn-axe-head', 'Craft Axe': 'btn-craft-axe',
                'Chop Wood': 'btn-chop'
            };
            
            Object.entries(btnMap).forEach(([task, id]) => {
                const btn = document.getElementById(id);
                if (!btn) return;
                btn.classList.toggle('active-task', currentTask === task);
                if (currentTask !== task) btn.style.setProperty('--p', '0%');
            });
        }

        function triggerPopup(id, text, isLoss) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = ' ' + text;
            el.classList.toggle('loss', isLoss);
            el.classList.remove('animate-plus');
            void el.offsetWidth; // Trigger reflow to restart animation
            el.classList.add('animate-plus');
        }

        const consumptionConfigs = {
            "Smelt Iron": { "coal": 1, "iron_ore": 1 },
            "Craft Pickaxe Head": { "stone": 10 },
            "Craft Pickaxe": { "pickaxe_head": 1, "sticks": 1, "fiber": 2 },
            "Craft Axe Head": { "flint": 2 },
            "Craft Axe": { "axe_head": 1, "sticks": 1, "fiber": 2 }
        };

        const requirementConfigs = {
            "Mine Iron": { "pickaxe": 1 },
            "Chop Wood": { "axe": 1 }
        };

        function gameLoop(now) {
            if (!lastTime) lastTime = now;
            const dt = now - lastTime;
            lastTime = now;

            if (currentTask) {
                const seconds = resourceConfigs[currentTask] || 1;
                const duration = seconds * 1000;
                const delay = 100; // 0.1s pause at the end
                const activeDuration = Math.max(0, duration - delay);
                
                progress += dt;

                // Check Tool Requirements
                const reqs = requirementConfigs[currentTask] || {};
                for (const [res, min] of Object.entries(reqs)) {
                    if (resources[res] < min) return requestAnimationFrame(gameLoop);
                }

                // Check if we have resources to continue
                const inputs = consumptionConfigs[currentTask] || {};
                for (const [res, req] of Object.entries(inputs)) {
                    if (resources[res] < req) {
                        // Local stop if out of resources
                        console.log("Out of " + res);
                        return requestAnimationFrame(gameLoop); 
                    }
                }

                if (progress >= duration) {
                    progress -= duration;
                    sessionCount++;

                    // Show red -1 for consumed resources immediately
                    for (const [res, req] of Object.entries(inputs)) {
                        resources[res] -= req; // Local consumption
                        triggerPopup(res + '-plus', '-' + req, true);
                    }
                }
                
                // Visual percentage: fill during activeDuration, hold at 100% during delay
                const p = Math.min(100, (progress / activeDuration) * 100);
                const btnMap = {
                    'Mine Coal': 'btn-coal', 'Gather Stone': 'btn-stone', 'Gather Sticks': 'btn-sticks',
                    'Gather Fiber': 'btn-fiber', 'Craft Pickaxe Head': 'btn-pick-head', 'Craft Pickaxe': 'btn-craft-pick',
                    'Mine Iron': 'btn-iron-ore', 'Smelt Iron': 'btn-iron',
                    'Craft Axe Head': 'btn-axe-head', 'Craft Axe': 'btn-craft-axe',
                    'Chop Wood': 'btn-chop'
                };
                let activeId = btnMap[currentTask] || '';
                const activeBtn = document.getElementById(activeId);
                if (activeBtn) activeBtn.style.setProperty('--p', p + '%');
                updateDisplay();
            }
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);

        function sendAction(resource) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                const nextTask = (currentTask === resource) ? null : resource;
                currentTask = nextTask;
                socket.send(JSON.stringify({ action: nextTask || "Idle" }));
                updateDisplay();
            }
        }
    </script>
</body>
</html>
