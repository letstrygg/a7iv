<!DOCTYPE html>
<html>
<head>
    <title>Idle Factory Prototype</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; margin-right: 10px; margin-bottom: 10px; cursor: pointer; }
        #game-section { display: none; } /* Hidden by default until logged in */
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Idle Factory Client</h2>

    <div id="auth-section">
        <p>Please log in to play.</p>
        <button onclick="loginWith('google')">Login with Google</button>
        <button onclick="loginWith('twitch')">Login with Twitch</button>
        <button onclick="loginWith('github')">Login with GitHub</button>
    </div>

    <div id="game-section">
        <p>Logged in as: <span id="player-name"></span></p>
        <button onclick="logout()">Logout</button>
        <hr>
        <button onclick="sendAction('Mine Stone')">Mine Stone</button>
        <button onclick="sendAction('Mine Coal')">Mine Coal</button>
    </div>

    <script>
        // FIXED: Renamed to supabaseClient to avoid colliding with the library
        const supabaseUrl = '{{ site.supabase_url }}';
        const supabaseKey = '{{ site.supabase_anon_key }}';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let socket; 

        // 2. Auth Functions
        async function loginWith(provider) {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: provider,
                options: {
                    // Send them exactly back to where they clicked the button
                    redirectTo: window.location.href 
                }
            });
            if (error) console.error("Login error:", error.message);
        }

        async function logout() {
            const { error } = await supabaseClient.auth.signOut();
            if (error) console.error("Logout error:", error.message);
        }

        // 3. UI State Management
        supabaseClient.auth.onAuthStateChange((event, session) => {
            const authSection = document.getElementById('auth-section');
            const gameSection = document.getElementById('game-section');
            const playerName = document.getElementById('player-name');

            if (session) {
                // User is logged in
                authSection.style.display = 'none';
                gameSection.style.display = 'block';
                
                // Get the user's name or email from the provider
                playerName.textContent = session.user.user_metadata.name || session.user.email;

                // Connect to the game server now that we are logged in
                connectToServer(session.access_token);
            } else {
                // User is logged out
                authSection.style.display = 'block';
                gameSection.style.display = 'none';
                
                // Close connection if they log out
                if (socket) socket.close();
            }
        });

        // 4. WebSocket Game Logic
        function connectToServer(token) {
            // Guard: Don't open a new connection if one is already opening/open
            if (socket && (socket.readyState === WebSocket.CONNECTING || socket.readyState === WebSocket.OPEN)) {
                return;
            }

            socket = new WebSocket("wss://game.a7iv.com");

            socket.onopen = function(e) {
                console.log("Connected to the server! Sending auth token...");
                
                const authPayload = { 
                    action: "authenticate", 
                    token: token 
                };
                // Use e.target to guarantee we send on this exact socket instance
                e.target.send(JSON.stringify(authPayload));
            };

            socket.onclose = function(e) {
                console.log("Disconnected from the server.");
                socket = null; // Clear it out so we can reconnect if needed
            };
        }

        function sendAction(resource) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                const payload = { action: resource };
                socket.send(JSON.stringify(payload));
                console.log("Sent:", payload);
            } else {
                console.log("Server is not connected.");
            }
        }
    </script>
</body>
</html>
