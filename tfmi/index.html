<!DOCTYPE html>
<html>
<head>
    <title>Idle Factory Prototype</title>
    <style>
        :root {
            --bg: #121212;
            --text: #e0e0e0;
            --border: #333;
            --accent: #4dabf7;
            --surface: #1e1e1e;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
        h2 { font-weight: 300; margin-bottom: 30px; }
        button {
            background-color: var(--surface);
            color: inherit;
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s, border-color 0.2s;
            margin: 0 8px 8px 0;
        }
        button:hover { background-color: #252525; border-color: #555; }
        hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
        #game-section { display: none; }
        .stat { color: var(--accent); font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="/js/auth.js"></script>
</head>
<body>
    <h2>Idle Factory Client</h2>

    <div id="auth-section">
        <p>Please log in to play.</p>
        <button onclick="loginWith('google')">Login with Google</button>
        <button onclick="loginWith('twitch')">Login with Twitch</button>
        <button onclick="loginWith('github')">Login with GitHub</button>
    </div>

    <div id="game-section">
        <p>Logged in as: <span id="player-name"></span></p>
        <button onclick="logout()">Logout</button>
        <hr>
        <p>Resources — Coal: <span id="coal-count" class="stat">0</span> | Stone: <span id="stone-count" class="stat">0</span></p>
        <hr>
        <button onclick="sendAction('Mine Stone')">Mine Stone</button>
        <button onclick="sendAction('Mine Coal')">Mine Coal</button>
    </div>

    <script>
        initAuth('{{ site.supabase_url }}', '{{ site.supabase_anon_key }}');

        let socket; 

        listenForAuthChanges(
            (session) => {
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('game-section').style.display = 'block';
                
                // 1. STOP GRABBING THE GOOGLE NAME HERE. 
                // Show a loading state instead while we wait for Python.
                document.getElementById('player-name').textContent = "Connecting to server...";
                
                connectToServer(session.access_token);
            },
            () => {
                document.getElementById('auth-section').style.display = 'block';
                document.getElementById('game-section').style.display = 'none';
                if (socket) socket.close();
            }
        );

        function connectToServer(token) {
            if (socket && (socket.readyState === WebSocket.CONNECTING || socket.readyState === WebSocket.OPEN)) return;

            socket = new WebSocket("wss://game.a7iv.com");
            
            socket.onopen = function(e) {
                e.target.send(JSON.stringify({ action: "authenticate", token: token }));
            };
            
            // 2. LISTEN FOR THE SERVER TO TELL US WHO WE ARE
            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.action === "auth_success") {
                    // Update the UI with the official database username
                    document.getElementById('player-name').textContent = data.username;
                    updateResources(data.coal, data.stone);
                } else if (data.action === "resource_update") {
                    updateResources(data.coal, data.stone);
                }
            };

            socket.onclose = function() { socket = null; };
        }

        function updateResources(coal, stone) {
            document.getElementById('coal-count').textContent = coal;
            document.getElementById('stone-count').textContent = stone;
        }

        function sendAction(resource) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ action: resource }));
            }
        }
    </script>
</body>
</html>
