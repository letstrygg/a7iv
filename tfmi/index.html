<!DOCTYPE html>
<html>
<head>
    <title>Idle Factory Prototype</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>
    <div id="top-bar">
        <div class="brand">Idle Factory</div>
        <div id="user-menu" class="user-menu" onclick="toggleDropdown()">
            <span id="player-name">Connecting...</span> <small>▼</small>
            <div id="user-dropdown" class="dropdown-content">
                <button onclick="resetPlayer()" style="color: var(--red);">Reset Progress</button>
                <button onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div id="sidebar">
            <button id="sidebar-toggle" onclick="toggleSidebar()">◀</button>
            <div class="sidebar-label" data-abbr="G"><span>Gathering</span></div>
            <button id="btn-sticks" class="sidebar-button" title="Gather Sticks" data-abbr="g.Stk" onclick="sendAction('Gather Sticks')"><span>Gather Sticks</span></button>
            <button id="btn-stone" class="sidebar-button" title="Gather Stone" data-abbr="g.Stn" onclick="sendAction('Gather Stone')"><span>Gather Stone</span></button>
            <button id="btn-fiber" class="sidebar-button" title="Gather Fiber" data-abbr="g.Fbr" onclick="sendAction('Gather Fiber')"><span>Gather Fiber</span></button>
            <button id="btn-coal" class="sidebar-button" title="Mine Coal" data-abbr="m.cl" onclick="sendAction('Mine Coal')"><span>Mine Coal</span></button>
            <div class="sidebar-label" data-abbr="C"><span>Crafting</span></div>
            <button id="btn-pick-head" class="sidebar-button" title="Craft Pickaxe Head" data-abbr="c.PH" onclick="sendAction('Craft Pickaxe Head')"><span>Pickaxe Head</span></button>
            <button id="btn-axe-head" class="sidebar-button" title="Craft Axe Head" data-abbr="c.AH" onclick="sendAction('Craft Axe Head')"><span>Axe Head</span></button>
            <button id="btn-craft-pick" class="sidebar-button" title="Craft Pickaxe" data-abbr="c.Pck" onclick="sendAction('Craft Pickaxe')"><span>Craft Pickaxe</span></button>
            <button id="btn-craft-axe" class="sidebar-button" title="Craft Axe" data-abbr="c.Axe" onclick="sendAction('Craft Axe')"><span>Craft Axe</span></button>
            <div class="sidebar-label" data-abbr="M"><span>Mining</span></div>
            <button id="btn-iron-ore" class="sidebar-button" title="Mine Iron" data-abbr="m.Irn" onclick="sendAction('Mine Iron')"><span>Mine Iron</span></button>
            <button id="btn-chop" class="sidebar-button" title="Chop Wood" data-abbr="c.Wd" onclick="sendAction('Chop Wood')"><span>Chop Wood</span></button>
            <div class="sidebar-label" data-abbr="P"><span>Processing</span></div>
            <button id="btn-iron" class="sidebar-button" title="Smelt Iron" data-abbr="s.Irn" onclick="sendAction('Smelt Iron')"><span>Smelt Iron</span></button>
        </div>

        <div id="main-content">
            <div id="auth-section">
                <h2>Idle Factory</h2>
                <p>Log in to play.</p>
                <button onclick="loginWith('google')">Login with Google</button>
                <button onclick="loginWith('twitch')">Login with Twitch</button>
                <button onclick="loginWith('github')">Login with GitHub</button>
            </div>

            <div id="game-section" style="position: relative;">
                <p id="task-status" style="cursor: pointer;" onclick="sendAction('Claim Resources')">Current Task: Idle</p>
                <hr>
                <div class="resource-grid">
                    <span>Coal: <span id="coal-count" class="stat"></span><span id="coal-plus" class="popup"></span></span>
                    <span>Stone: <span id="stone-count" class="stat"></span><span id="stone-plus" class="popup"></span></span>
                    <span>Sticks: <span id="sticks-count" class="stat"></span><span id="sticks-plus" class="popup"></span></span>
                    <span>Flint: <span id="flint-count" class="stat"></span><span id="flint-plus" class="popup"></span></span>
                    <span>Gemstones: <span id="gemstones-count" class="stat"></span><span id="gemstones-plus" class="popup"></span></span>
                    <span>Fiber: <span id="fiber-count" class="stat"></span><span id="fiber-plus" class="popup"></span></span>
                    <span>Pickaxe Head: <span id="pickaxe_head-count" class="stat"></span><span id="pickaxe_head-plus" class="popup"></span></span>
                    <span>Iron Ore: <span id="iron_ore-count" class="stat"></span><span id="iron_ore-plus" class="popup"></span></span>
                    <span>Iron: <span id="iron-count" class="stat"></span><span id="iron-plus" class="popup"></span></span>
                    <span>Pickaxe: <span id="pickaxe-count" class="stat"></span><span id="pickaxe-plus" class="popup"></span></span>
                    <span>Wood: <span id="wood-count" class="stat"></span><span id="wood-plus" class="popup"></span></span>
                    <span>Axe Head: <span id="axe_head-count" class="stat"></span><span id="axe_head-plus" class="popup"></span></span>
                    <span>Axe: <span id="axe-count" class="stat"></span><span id="axe-plus" class="popup"></span></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const isCollapsed = sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebarCollapsed', isCollapsed);
            const toggle = document.getElementById('sidebar-toggle');
            toggle.textContent = isCollapsed ? '▶' : '◀';
        }

        function toggleDropdown() {
            console.log("UI: Toggling User Dropdown");
            document.getElementById('user-dropdown').classList.toggle('show');
        }

        // Restore sidebar state on page load
        (function() {
            const sidebar = document.getElementById('sidebar');
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                sidebar.classList.add('collapsed');
                document.getElementById('sidebar-toggle').textContent = '▶';
            }
        })();

        // Close dropdown when clicking outside
        window.addEventListener('click', function(e) {
            const menu = document.getElementById('user-menu');
            const dropdown = document.getElementById('user-dropdown');
            if (!menu.contains(e.target)) {
                dropdown.classList.remove('show');
            }
        });
    </script>

    <script>
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        
        // Pulling keys from the single config file loaded in the <head>
        const spUrl = window.SUPABASE_URL;
        const spKey = window.SUPABASE_ANON_KEY;
        
        console.log("Auth Init: Checking Config", { hasUrl: !!spUrl, hasKey: !!spKey });

        let socket = null; 
        let resources = { 
            coal: null, stone: null, sticks: null, flint: null, gemstones: null, 
            fiber: null, pickaxe_head: null, iron_ore: null, iron: null, pickaxe: null,
            wood: null, axe_head: null, axe: null
        };
        let resourceConfigs = {};
        let currentTask = null;
        let username = "";
        let progress = 0;
        let sessionCount = 0;
        let lastTime = 0;

        if (spUrl && spKey) {
            initAuth(spUrl, spKey);
            console.log("Auth Init: Supabase client created.");
            listenForAuthChanges(
                (session) => {
                    console.log("Auth Callback: User is SIGNED IN", session.user.email);
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('game-section').style.display = 'block';
                    document.getElementById('user-menu').style.display = 'block';
                    document.getElementById('player-name').textContent = "Connecting...";
                    connectToServer(session.access_token);
                },
                () => {
                    console.log("Auth Callback: User is SIGNED OUT");
                    document.getElementById('auth-section').style.display = 'block';
                    document.getElementById('game-section').style.display = 'none';
                    document.getElementById('user-menu').style.display = 'none';
                    if (socket) { console.log("Socket: Closing due to sign-out"); socket.close(); }
                }
            );
        } else {
            console.error("Auth Init: Supabase configuration is missing. Ensure your web host environment variables are set correctly.");
            document.getElementById('player-name').textContent = "Config Error";
        }

        function connectToServer(token) {
            if (socket && (socket.readyState === WebSocket.CONNECTING || socket.readyState === WebSocket.OPEN)) {
                console.log("Socket: Connection already active or pending.");
                return;
            }

            const wsUrl = isLocal ? "ws://localhost:8765" : "wss://game.a7iv.com";
            console.log("Socket: Attempting connection to", wsUrl);
            socket = new WebSocket(wsUrl);
            
            socket.onopen = function(e) {
                console.log("Socket: Connection established. Sending authentication token.");
                e.target.send(JSON.stringify({ action: "authenticate", token: token }));
            };
            
            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                console.log("Socket: Received message", data.action);
                
                if (data.action === "auth_success") {
                    console.log("Socket: Auth Successful for", data.username);
                    username = data.username;
                    resourceConfigs = data.resource_configs;

                    // Resume task and calculate progress based on server timestamp
                    currentTask = data.current_task === "Idle" ? null : data.current_task;
                    if (currentTask && data.last_claim) {
                        // SQLite uses UTC; adding 'Z' ensures JS treats it as UTC
                        const startTime = new Date(data.last_claim + "Z").getTime();
                        const elapsed = Date.now() - startTime;
                        const duration = (resourceConfigs[currentTask] || 1) * 1000;
                        sessionCount = Math.floor(elapsed / duration);
                        progress = elapsed % duration;
                    }

                    resources.coal = data.coal;
                    resources.stone = data.stone;
                    resources.sticks = data.sticks || 0;
                    resources.flint = data.flint || 0;
                    resources.gemstones = data.gemstones || 0;
                    resources.fiber = data.fiber || 0;
                    resources.pickaxe_head = data.pickaxe_head || 0;
                    resources.iron_ore = data.iron_ore || 0;
                    resources.iron = data.iron || 0;
                    resources.pickaxe = data.pickaxe || 0;
                    resources.wood = data.wood || 0;
                    resources.axe_head = data.axe_head || 0;
                    resources.axe = data.axe || 0;
                    updateDisplay();
                } else if (data.action === "resource_update") {
                    syncResources(data.stats, data.gains, data.source);
                }
            };

            socket.onclose = function() { console.log("Socket: Connection closed."); socket = null; };
        }

        function syncResources(stats, gains, source) {
            // Show the "Cash Out" animations (+N)
            for (const [res, amount] of Object.entries(gains)) {
                if (amount > 0) triggerPopup(res + '-plus', '+' + amount, false);
                else if (amount < 0) triggerPopup(res + '-plus', amount, true);
            }
            resources = stats;
            if (source !== 'Claim Resources') {
                progress = 0; 
            }
            sessionCount = 0;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('player-name').textContent = username || "Connecting...";
            const format = (val) => (val === null) ? "" : Math.floor(val);
            document.getElementById('coal-count').textContent = format(resources.coal);
            document.getElementById('stone-count').textContent = format(resources.stone);
            document.getElementById('sticks-count').textContent = format(resources.sticks);
            document.getElementById('flint-count').textContent = format(resources.flint);
            document.getElementById('gemstones-count').textContent = format(resources.gemstones);
            document.getElementById('fiber-count').textContent = format(resources.fiber);
            document.getElementById('pickaxe_head-count').textContent = format(resources.pickaxe_head);
            document.getElementById('iron_ore-count').textContent = format(resources.iron_ore);
            document.getElementById('iron-count').textContent = format(resources.iron);
            document.getElementById('pickaxe-count').textContent = format(resources.pickaxe);
            document.getElementById('wood-count').textContent = format(resources.wood);
            document.getElementById('axe_head-count').textContent = format(resources.axe_head);
            document.getElementById('axe-count').textContent = format(resources.axe);
            
            const status = document.getElementById('task-status');
            status.textContent = currentTask ? `Current Task: ${currentTask} (+${sessionCount})` : 'Current Task: Idle';
            
            // Handle button highlighting
            const btnMap = {
                'Mine Coal': 'btn-coal', 'Gather Stone': 'btn-stone', 'Gather Sticks': 'btn-sticks',
                'Gather Fiber': 'btn-fiber', 'Craft Pickaxe Head': 'btn-pick-head', 'Craft Pickaxe': 'btn-craft-pick',
                'Mine Iron': 'btn-iron-ore', 'Smelt Iron': 'btn-iron',
                'Craft Axe Head': 'btn-axe-head', 'Craft Axe': 'btn-craft-axe',
                'Chop Wood': 'btn-chop'
            };
            
            Object.entries(btnMap).forEach(([task, id]) => {
                const btn = document.getElementById(id);
                if (!btn) return;
                btn.classList.toggle('active-task', currentTask === task);
                if (currentTask !== task) btn.style.setProperty('--p', '0%');
            });
        }

        function triggerPopup(id, text, isLoss) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = ' ' + text;
            el.classList.toggle('loss', isLoss);
            el.classList.remove('animate-plus');
            void el.offsetWidth; // Trigger reflow to restart animation
            el.classList.add('animate-plus');
        }

        const consumptionConfigs = {
            "Smelt Iron": { "coal": 1, "iron_ore": 1 },
            "Craft Pickaxe Head": { "stone": 10 },
            "Craft Pickaxe": { "pickaxe_head": 1, "sticks": 1, "fiber": 2 },
            "Craft Axe Head": { "flint": 2 },
            "Craft Axe": { "axe_head": 1, "sticks": 1, "fiber": 2 }
        };

        const requirementConfigs = {
            "Mine Iron": { "pickaxe": 1 },
            "Chop Wood": { "axe": 1 }
        };

        function gameLoop(now) {
            if (!lastTime) lastTime = now;
            const dt = now - lastTime;
            lastTime = now;

            if (currentTask) {
                const seconds = resourceConfigs[currentTask] || 1;
                const duration = seconds * 1000;
                const delay = 100; // 0.1s pause at the end
                const activeDuration = Math.max(0, duration - delay);
                
                progress += dt;

                // Check Tool Requirements
                const reqs = requirementConfigs[currentTask] || {};
                for (const [res, min] of Object.entries(reqs)) {
                    if (resources[res] < min) return requestAnimationFrame(gameLoop);
                }

                // Check if we have resources to continue
                const inputs = consumptionConfigs[currentTask] || {};
                for (const [res, req] of Object.entries(inputs)) {
                    if (resources[res] < req) {
                        // Local stop if out of resources
                        console.log("Out of " + res);
                        return requestAnimationFrame(gameLoop); 
                    }
                }

                if (progress >= duration) {
                    progress -= duration;
                    sessionCount++;

                    // Show red -1 for consumed resources immediately
                    for (const [res, req] of Object.entries(inputs)) {
                        resources[res] -= req; // Local consumption
                        triggerPopup(res + '-plus', '-' + req, true);
                    }
                }
                
                // Visual percentage: fill during activeDuration, hold at 100% during delay
                const p = Math.min(100, (progress / activeDuration) * 100);
                const btnMap = {
                    'Mine Coal': 'btn-coal', 'Gather Stone': 'btn-stone', 'Gather Sticks': 'btn-sticks',
                    'Gather Fiber': 'btn-fiber', 'Craft Pickaxe Head': 'btn-pick-head', 'Craft Pickaxe': 'btn-craft-pick',
                    'Mine Iron': 'btn-iron-ore', 'Smelt Iron': 'btn-iron',
                    'Craft Axe Head': 'btn-axe-head', 'Craft Axe': 'btn-craft-axe',
                    'Chop Wood': 'btn-chop'
                };
                let activeId = btnMap[currentTask] || '';
                const activeBtn = document.getElementById(activeId);
                if (activeBtn) activeBtn.style.setProperty('--p', p + '%');
                updateDisplay();
            }
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);

        function sendAction(resource) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                if (resource === 'Claim Resources') {
                    socket.send(JSON.stringify({ action: resource }));
                    return;
                }
                const nextTask = (currentTask === resource) ? null : resource;
                progress = 0;
                sessionCount = 0;
                currentTask = nextTask;
                socket.send(JSON.stringify({ action: nextTask || "Idle" }));
                updateDisplay();
            }
        }

        function resetPlayer() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ action: "Reset Player" }));
                currentTask = null;
                progress = 0;
                sessionCount = 0;
                updateDisplay();
                toggleDropdown();
            }
        }
    </script>
</body>
</html>
