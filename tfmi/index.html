<!DOCTYPE html>
<html>
<head>
    <title>Idle Factory Prototype</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:,">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>
    <div id="top-bar">
        <div class="brand">Idle Factory</div>
        <div id="user-menu" class="user-menu" onclick="toggleDropdown()">
            <span id="player-name">Connecting...</span> <small>▼</small>
            <div id="user-dropdown" class="dropdown-content">
                <button onclick="resetPlayer()" style="color: var(--red);">Reset Progress</button>
                <button onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div id="sidebar">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button id="sidebar-toggle" onclick="toggleSidebar()">◀</button>
                <button id="settings-toggle" onclick="toggleSettingsMode()" style="padding:5px; margin:0; border:0; background:none; font-size:16px;">⚙️</button>
            </div>
            <div class="sidebar-label" data-abbr="G"><span>Gathering</span></div>
            <button id="btn-sticks" class="sidebar-button" title="Gather Sticks" data-abbr="g.Stk" onclick="sendAction('Gather Sticks')"><span>Gather Sticks</span></button>
            <button id="btn-stone" class="sidebar-button" title="Gather Stone" data-abbr="g.Stn" onclick="sendAction('Gather Stone')"><span>Gather Stone</span></button>
            <button id="btn-fiber" class="sidebar-button" title="Gather Fiber" data-abbr="g.Fbr" onclick="sendAction('Gather Fiber')"><span>Gather Fiber</span></button>
            
            <div class="sidebar-label" data-abbr="C"><span>Crafting</span></div>
            <button id="btn-axe-head" class="sidebar-button" title="Craft Axe Head" data-abbr="c.AH" onclick="sendAction('Craft Axe Head')"><span>Axe Head</span></button>
            <button id="btn-craft-pick" class="sidebar-button" title="Craft Pickaxe" data-abbr="c.Pck" onclick="sendAction('Craft Pickaxe')"><span>Craft Pickaxe</span></button>
            <button id="btn-craft-axe" class="sidebar-button" title="Craft Axe" data-abbr="c.Axe" onclick="sendAction('Craft Axe')"><span>Craft Axe</span></button>
            
            <div class="sidebar-label" data-abbr="M"><span>Mining</span></div>
            <button id="btn-coal" class="sidebar-button" title="Mine Coal" data-abbr="m.cl" onclick="sendAction('Mine Coal')"><span>Mine Coal</span></button>
            <button id="btn-iron-ore" class="sidebar-button" title="Mine Iron Ore" data-abbr="m.Irn" onclick="sendAction('Mine Iron Ore')"><span>Mine Iron Ore</span></button>
            <button id="btn-chop" class="sidebar-button" title="Chop Wood" data-abbr="c.Wd" onclick="sendAction('Chop Wood')"><span>Chop Wood</span></button>
            <div class="sidebar-label" data-abbr="P"><span>Processing</span></div>
            <button id="btn-iron" class="sidebar-button" title="Smelt Iron" data-abbr="s.Irn" onclick="sendAction('Smelt Iron')"><span>Smelt Iron</span></button>
        </div>

        <div id="main-content">
            <div id="auth-section">
                <h2>Idle Factory</h2>
                <p>Log in to play.</p>
                <button onclick="loginWith('google')">Login with Google</button>
                <button onclick="loginWith('twitch')">Login with Twitch</button>
                <button onclick="loginWith('github')">Login with GitHub</button>
            </div>

            <div id="game-section" style="position: relative;">
                <p id="task-status" style="cursor: pointer;" onclick="sendAction('Claim Resources')">Current Task: Idle</p>
                <hr>
                <div class="resource-grid" id="resource-display"></div>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const isCollapsed = sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebarCollapsed', isCollapsed);
            const toggle = document.getElementById('sidebar-toggle');
            toggle.textContent = isCollapsed ? '▶' : '◀';
        }

        function toggleDropdown() {
            console.log("UI: Toggling User Dropdown");
            document.getElementById('user-dropdown').classList.toggle('show');
        }

        // Restore sidebar state on page load
        (function() {
            const sidebar = document.getElementById('sidebar');
            const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
            if (isCollapsed) {
                sidebar.classList.add('collapsed');
                document.getElementById('sidebar-toggle').textContent = '▶';
            }
        })();

        // Close dropdown when clicking outside
        window.addEventListener('click', function(e) {
            const menu = document.getElementById('user-menu');
            const dropdown = document.getElementById('user-dropdown');
            if (!menu.contains(e.target)) {
                dropdown.classList.remove('show');
            }
        });
    </script>

    <script>
        function res_key(name) {
            return name.toLowerCase().replace(/ /g, '_').replace(/[^a-z0-9_]/g, '');
        }

        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        
        // Pulling keys from the single config file loaded in the <head>
        const spUrl = window.SUPABASE_URL;
        const spKey = window.SUPABASE_ANON_KEY;
        
        console.log("Auth Init: Checking Config", { hasUrl: !!spUrl, hasKey: !!spKey });

        let socket = null; 
        let resources = {};
        let unlockedTasks = [];
        let hiddenTasks = [];
        let storageAssignments = {};
        let storageCrate = 0;
        let isSettingsMode = false;
        let resourceConfigs = {};
        let currentTask = null;
        let autoStopAt = null;
        let lastSyncTime = 0;
        let username = "";
        let progress = 0;
        let sessionCount = 0;
        let lastTime = 0;

        if (spUrl && spKey) {
            initAuth(spUrl, spKey);
            console.log("Auth Init: Supabase client created.");
            listenForAuthChanges(
                (session) => {
                    console.log("Auth Callback: User is SIGNED IN", session.user.email);
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('game-section').style.display = 'block';
                    document.getElementById('user-menu').style.display = 'block';
                    document.getElementById('player-name').textContent = "Connecting...";
                    connectToServer(session.access_token);
                },
                () => {
                    console.log("Auth Callback: User is SIGNED OUT");
                    document.getElementById('auth-section').style.display = 'block';
                    document.getElementById('game-section').style.display = 'none';
                    document.getElementById('user-menu').style.display = 'none';
                    if (socket) { console.log("Socket: Closing due to sign-out"); socket.close(); }
                }
            );
        } else {
            console.error("Auth Init: Supabase configuration is missing. Ensure your web host environment variables are set correctly.");
            document.getElementById('player-name').textContent = "Config Error";
        }

        function connectToServer(token) {
            if (socket && (socket.readyState === WebSocket.CONNECTING || socket.readyState === WebSocket.OPEN)) {
                console.log("Socket: Connection already active or pending.");
                return;
            }

            const wsUrl = isLocal ? "ws://localhost:8765" : "wss://game.a7iv.com";
            console.log("Socket: Attempting connection to", wsUrl);
            socket = new WebSocket(wsUrl);
            
            socket.onopen = function(e) {
                console.log("Socket: Connection established. Sending authentication token.");
                e.target.send(JSON.stringify({ action: "authenticate", token: token }));
            };
            
            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                console.log("Socket: Received message", data.action);
                
                if (data.action === "auth_success") {
                    console.log("Socket: Auth Successful for", data.username);
                    username = data.username;
                    resourceConfigs = data.resource_configs;
                    unlockedTasks = data.unlocked_tasks || [];
                    resources = data.stats;
                    hiddenTasks = data.hidden_tasks || [];
                    storageAssignments = data.storage_assignments || {};
                    storageCrate = data.storage_crate || 0;

                    // Resume task and calculate progress based on server timestamp
                    currentTask = data.current_task === "Idle" ? null : data.current_task;
                    autoStopAt = data.auto_stop_at ? new Date(data.auto_stop_at + "Z").getTime() : null;
                    if (data.last_claim) {
                        lastSyncTime = new Date(data.last_claim + "Z").getTime();
                    }

                    updateDisplay();
                } else if (data.action === "resource_update") {
                    if (data.unlocked_tasks) unlockedTasks = data.unlocked_tasks;
                    if (data.hidden_tasks) hiddenTasks = data.hidden_tasks;
                    currentTask = data.current_task === "Idle" ? null : data.current_task;
                    autoStopAt = data.auto_stop_at ? new Date(data.auto_stop_at + "Z").getTime() : null;
                    if (data.last_claim) {
                        lastSyncTime = new Date(data.last_claim + "Z").getTime();
                    }
                    syncResources(data.stats, data.gains, data.source);
                } else if (data.action === "visibility_update") {
                    hiddenTasks = data.hidden_tasks;
                    updateDisplay();
                }
            };

            socket.onclose = function() { console.log("Socket: Connection closed."); socket = null; };
        }

        function syncResources(stats, gains, source) {
            // Show the "Cash Out" animations (+N)
            for (const [res, amount] of Object.entries(gains)) {
                if (amount > 0) triggerPopup(res + '-plus', '+' + amount, false);
                else if (amount < 0) triggerPopup(res + '-plus', amount, true);
            }
            resources = stats;
            if (source !== 'Claim Resources') {
                progress = 0; 
            }
            sessionCount = 0;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('player-name').textContent = username || "Connecting...";
            const grid = document.getElementById('resource-display');
            
            const infraKeys = ["player_slug", "current_task", "task_start", "last_claim", "auto_stop_at", "unlocked_tasks", "hidden_tasks", "storage_assignments", "storage_crate", "username", "slug", "email", "picture"];

            for (const [res, val] of Object.entries(resources)) {
                if (infraKeys.includes(res)) continue;

                const isRevealed = val > 0 || unlockedTasks.some(t => {
                    const taskRes = resourceConfigs[t]?.resource;
                    return taskRes && res_key(taskRes) === res;
                });

                let row = document.getElementById('row-' + res);
                if (isRevealed) {
                    if (!row) {
                        row = document.createElement('span');
                        row.id = 'row-' + res;
                        const label = res.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                        row.innerHTML = `${label}: <span id="${res}-count" class="stat"></span><span id="${res}-plus" class="popup"></span>`;
                        grid.appendChild(row);
                    }
                    row.style.display = 'inline-block';
                    
                    const el = document.getElementById(res + '-count');
                    if (el) {
                        const taskConfig = Object.values(resourceConfigs).find(c => 
                            c.resource && res_key(c.resource) === res
                        ) || {limit: 10};
                        
                        const crates = storageAssignments[res] || 0;
                        const cap = (taskConfig.limit || 10) + (crates * 10);
                        el.textContent = `${Math.floor(val || 0)} / ${cap}`;
                    }
                } else if (row) {
                    row.style.display = 'none';
                }
            }
            
            const status = document.getElementById('task-status');
            status.textContent = currentTask ? `Current Task: ${currentTask} (+${sessionCount})` : 'Current Task: Idle';
            
            // Handle button highlighting
            const btnMap = {
                'Mine Coal': 'btn-coal', 'Gather Stone': 'btn-stone', 'Gather Sticks': 'btn-sticks', 'Gather Fiber': 'btn-fiber',
                'Craft Pickaxe': 'btn-craft-pick',
                'Mine Iron Ore': 'btn-iron-ore', 'Smelt Iron': 'btn-iron', 'Craft Axe Head': 'btn-axe-head', 'Craft Axe': 'btn-craft-axe',
                'Chop Wood': 'btn-chop'
            };
            
            Object.entries(btnMap).forEach(([task, id]) => {
                const btn = document.getElementById(id);
                if (!btn) return;

                 const isUnlocked = unlockedTasks.includes(task);
                const isHidden = hiddenTasks.includes(task);
                
                if (isSettingsMode) {
                    btn.style.display = isUnlocked ? 'block' : 'none';
                    btn.style.opacity = isHidden ? '0.4' : '1';
                    btn.style.border = isHidden ? '1px dashed var(--red)' : '1px solid var(--blue)';
                } else {
                    btn.style.display = (isUnlocked && !isHidden) ? 'block' : 'none';
                    btn.style.opacity = '1';
                    btn.style.border = '0px';
                }

                btn.classList.toggle('active-task', currentTask === task);
                if (currentTask !== task) btn.style.setProperty('--p', '0%');
            });
        }

        function toggleSettingsMode() {
            isSettingsMode = !isSettingsMode;
            document.getElementById('settings-toggle').style.background = isSettingsMode ? 'var(--hover-bg)' : 'none';
            updateDisplay();
        }

        function triggerPopup(id, text, isLoss) {
            const el = document.getElementById(id);
            if (!el) return;
            el.textContent = ' ' + text;
            el.classList.toggle('loss', isLoss);
            el.classList.remove('animate-plus');
            void el.offsetWidth; // Trigger reflow to restart animation
            el.classList.add('animate-plus');
        }

        function gameLoop(now) {
            if (!lastTime) lastTime = now;
            const dt = now - lastTime;
            lastTime = now;

            if (currentTask && lastSyncTime) {
                const config = resourceConfigs[currentTask];
                if (!config) return requestAnimationFrame(gameLoop);

                const nowTs = Date.now();
                const duration = (config.duration || 5) * 1000;

                // 1. Check for Auto-Stop
                // Added 500ms leeway to account for clock drift between client/server
                if (autoStopAt && nowTs >= (autoStopAt + 500)) {
                    console.log("UI: Auto-stop reached. Finalizing visual.");
                    progress = duration; // Force bar to 100%
                    updateDisplay();
                    autoStopAt = null; 
                    sendAction('Claim Resources');
                    return requestAnimationFrame(gameLoop);
                }

                // 2. Calculate Clock-Based Progress
                // Use Math.max to handle cases where the client clock is slightly behind the server
                const totalElapsed = Math.max(0, nowTs - lastSyncTime);
                const newSessionCount = Math.floor(totalElapsed / duration);
                const newProgress = totalElapsed % duration;

                // 3. Trigger local resource popups if cycles passed
                if (newSessionCount > sessionCount) {
                    const diff = newSessionCount - sessionCount;
                    const inputs = config.inputs || {};
                    for (let i = 0; i < diff; i++) {
                        for (const [item, req] of Object.entries(inputs)) {
                            const rk = res_key(item);
                            resources[rk] -= req;
                            triggerPopup(rk + '-plus', '-' + req, true);
                        }
                    }
                    sessionCount = newSessionCount;
                }
                progress = newProgress;

                // 4. Check Tool Requirements
                if (config.tool_required) {
                    const tKey = res_key(config.tool_required);
                    if ((resources[tKey] || 0) < 1) return requestAnimationFrame(gameLoop);
                }

                // 5. Check if we have resources to continue
                const inputs = config.inputs || {};
                for (const [item, req] of Object.entries(inputs)) {
                    if ((resources[res_key(item)] || 0) < req) {
                        // Local stop if out of resources
                        console.log("Out of " + item);
                        return requestAnimationFrame(gameLoop); 
                    }
                }

                // Visual percentage: fill during activeDuration, hold at 100% during delay
                const delay = 100;
                const activeDuration = Math.max(0, duration - delay);
                const p = Math.min(100, (progress / activeDuration) * 100);
                const btnMap = {
                    'Mine Coal': 'btn-coal', 'Gather Stone': 'btn-stone', 'Gather Sticks': 'btn-sticks',
                    'Gather Fiber': 'btn-fiber', 'Craft Pickaxe': 'btn-craft-pick',
                    'Mine Iron Ore': 'btn-iron-ore', 'Smelt Iron': 'btn-iron',
                    'Chop Wood': 'btn-chop'
                };
                let activeId = btnMap[currentTask] || '';
                const activeBtn = document.getElementById(activeId);
                if (activeBtn) activeBtn.style.setProperty('--p', p + '%');
                updateDisplay();
            }
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);

        function sendAction(resource) {
            if (isSettingsMode) {
                socket.send(JSON.stringify({ action: "Toggle Visibility", task: resource }));
                return;
            }
            if (socket && socket.readyState === WebSocket.OPEN) {
                if (resource === 'Claim Resources') {
                    socket.send(JSON.stringify({ action: resource }));
                    return;
                }
                const nextTask = (currentTask === resource) ? null : resource;

                // --- Flicker Prevention: Pre-verify task validity locally ---
                if (nextTask) {
                    const config = resourceConfigs[nextTask];
                    if (config) {
                        const rk = res_key(config.resource);
                        const crates = storageAssignments[rk] || 0;
                        const cap = config.limit + (crates * 10);
                        
                        // Check Capacity
                        if ((resources[rk] || 0) >= cap) {
                            console.log(`UI: ${rk} appears full.`);
                            socket.send(JSON.stringify({ action: nextTask }));
                            return; 
                        }

                        // Check Ingredients & Tool Requirements
                        const inputs = config.inputs || {};
                        if (config.tool_required && (resources[res_key(config.tool_required)] || 0) < 1) return;
                        for (const [item, req] of Object.entries(inputs)) {
                            if ((resources[res_key(item)] || 0) < req) {
                                console.log(`UI: Missing ${item}.`);
                                socket.send(JSON.stringify({ action: nextTask }));
                                return;
                            }
                        }
                    }
                }

                // Optimistic update: Only run if the client thinks the task is possible
                progress = 0;
                sessionCount = 0;
                lastSyncTime = Date.now(); // Set to now so animation starts immediately
                currentTask = nextTask;
                socket.send(JSON.stringify({ action: nextTask || "Idle" }));
                updateDisplay();
            }
        }

        function resetPlayer() {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ action: "Reset Player" }));
                currentTask = null;
                autoStopAt = null;
                lastSyncTime = 0;
                progress = 0;
                sessionCount = 0;
                updateDisplay();
                toggleDropdown();
            }
        }
    </script>
</body>
</html>
